<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Specifies the character encoding for the HTML document -->
    <meta charset="UTF-8">

    <!-- Makes the webpage responsive on different devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title displayed in the browser tab -->
    <title>CSS Animations</title>

    <!-- External CSS File -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ====================================================== -->
    <!--                  Main Page Heading                     -->
    <!-- ====================================================== -->

    <!--
        Displays the title of the demonstration page.
    -->
    <header>

        <h1>CSS Animations Demonstration</h1>

        <p>
            Basic examples of commonly used CSS animations.
        </p>

    </header>

    <!-- ====================================================== -->
    <!--                Animation Demonstrations                -->
    <!-- ====================================================== -->

    <main>

        <!-- ================================================ -->
        <!--               Move Animation                     -->
        <!-- ================================================ -->

        <section>

            <h2>Move Animation</h2>

            <!--
                This box moves horizontally
                from left to right.
            -->
            <div class="box move-box">

                Move

            </div>

        </section>

        <!-- ================================================ -->
        <!--               Rotate Animation                   -->
        <!-- ================================================ -->

        <section>

            <h2>Rotate Animation</h2>

            <!--
                This box continuously rotates.
            -->
            <div class="box rotate-box">

                Rotate

            </div>

        </section>

        <!-- ================================================ -->
        <!--               Scale Animation                    -->
        <!-- ================================================ -->

        <section>

            <h2>Scale Animation</h2>

            <!--
                This box grows and shrinks repeatedly.
            -->
            <div class="box scale-box">

                Scale

            </div>

        </section>

        <!-- ================================================ -->
        <!--               Fade Animation                     -->
        <!-- ================================================ -->

        <section>

            <h2>Fade Animation</h2>

            <!--
                This box fades in and fades out.
            -->
            <div class="box fade-box">

                Fade

            </div>

        </section>

        <!-- ================================================ -->
        <!--              Color Animation                     -->
        <!-- ================================================ -->

        <section>

            <h2>Color Change Animation</h2>

            <!--
                This box changes background colors.
            -->
            <div class="box color-box">

                Color

            </div>

        </section>

        <!-- ================================================ -->
        <!--              Bounce Animation                    -->
        <!-- ================================================ -->

        <section>

            <h2>Bounce Animation</h2>

            <!--
                This box bounces vertically.
            -->
            <div class="box bounce-box">

                Bounce

            </div>

        </section>

    </main>

</body>

</html>
