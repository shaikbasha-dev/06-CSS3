<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Specifies the character encoding used by the HTML document -->
    <meta charset="UTF-8">

    <!-- Makes the webpage responsive on different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title displayed in the browser tab -->
    <title>CSS Horizontal Navigation Bar</title>

    <!-- Links the external CSS stylesheet -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================================================= -->
    <!--             Main Horizontal Navigation Section            -->
    <!-- ========================================================= -->
    <!--
        The <nav> element defines the primary navigation
        section of the webpage.

        Benefits:
        - Semantic HTML
        - Better Accessibility
        - Improved Search Engine Optimization (SEO)
        - Easier code maintenance
    -->
    <nav>

        <!--
            Unordered List

            Stores all navigation links.

            Each navigation option is represented
            using one list item (<li>).
        -->
        <ul>

            <!-- Navigation Item 1 -->
            <li>

                <!--
                    Active Navigation Link

                    The active class highlights
                    the currently opened page.
                -->
                <a href="#" class="active">Home</a>

            </li>

            <!-- Navigation Item 2 -->
            <li>

                <!-- About Page -->
                <a href="#">About</a>

            </li>

            <!-- Navigation Item 3 -->
            <li>

                <!-- Services Page -->
                <a href="#">Services</a>

            </li>

            <!-- Navigation Item 4 -->
            <li>

                <!-- Courses Page -->
                <a href="#">Courses</a>

            </li>

            <!-- Navigation Item 5 -->
            <li>

                <!-- Gallery Page -->
                <a href="#">Gallery</a>

            </li>

            <!-- Navigation Item 6 -->
            <li>

                <!-- Blog Page -->
                <a href="#">Blog</a>

            </li>

            <!-- Navigation Item 7 -->
            <li>

                <!-- Contact Page -->
                <a href="#">Contact</a>

            </li>

            <!-- Navigation Item 8 -->
            <li>

                <!-- Login Page -->
                <a href="#">Login</a>

            </li>

        </ul>

    </nav>

</body>

</html>
