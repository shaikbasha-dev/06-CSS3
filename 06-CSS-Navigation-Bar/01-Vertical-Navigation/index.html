<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Specifies the character encoding used by the HTML document -->
    <meta charset="UTF-8">

    <!-- Makes the webpage responsive on different screen sizes -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title displayed in the browser tab -->
    <title>CSS Vertical Navigation Bar</title>

    <!-- Links the external CSS file -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ========================================================= -->
    <!--               Main Vertical Navigation Section            -->
    <!-- ========================================================= -->
    <!--
        The <nav> element represents the primary navigation area
        of the webpage.

        Benefits:
        - Semantic HTML
        - Better Accessibility
        - Improved SEO
        - Easy to identify navigation content
    -->
    <nav>

        <!--
            Unordered List

            Stores all navigation menu items.

            Each menu option is represented using a list item (<li>).
        -->
        <ul>

            <!-- Navigation Item 1 -->
            <li>

                <!--
                    Active Navigation Link

                    The "active" class highlights the current page.
                -->
                <a href="#" class="active">Dashboard</a>

            </li>

            <!-- Navigation Item 2 -->
            <li>

                <!-- Student Management Page -->
                <a href="#">Students</a>

            </li>

            <!-- Navigation Item 3 -->
            <li>

                <!-- Courses Page -->
                <a href="#">Courses</a>

            </li>

            <!-- Navigation Item 4 -->
            <li>

                <!-- Faculty Page -->
                <a href="#">Faculty</a>

            </li>

            <!-- Navigation Item 5 -->
            <li>

                <!-- Library Page -->
                <a href="#">Library</a>

            </li>

            <!-- Navigation Item 6 -->
            <li>

                <!-- Reports Page -->
                <a href="#">Reports</a>

            </li>

            <!-- Navigation Item 7 -->
            <li>

                <!-- Settings Page -->
                <a href="#">Settings</a>

            </li>

            <!-- Navigation Item 8 -->
            <li>

                <!-- Logout Page -->
                <a href="#">Logout</a>

            </li>

        </ul>

    </nav>

</body>

</html>
